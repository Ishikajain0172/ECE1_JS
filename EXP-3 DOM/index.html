<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM Manipulation and Event Handling</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1 id="heading">Welcome to JavaScript DOM</h1>

        <p id="para">This is a sample paragraph for DOM manipulation.</p>

        <input type="text" id="textInput" placeholder="Enter new heading text">

        <div class="buttons">
            <button id="changeHeadingBtn">Change Heading</button>
            <button id="changeBgBtn">Change Background</button>
            <button id="increaseFontBtn">Increase Font Size</button>
            <button id="toggleParaBtn">Show / Hide Paragraph</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
